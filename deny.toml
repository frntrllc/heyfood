[advisories]
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
  { name = "hyper-tls", reason = "The client uses rustls exclusively." },
  { name = "native-tls", reason = "The client uses rustls exclusively." },
  { name = "openssl", reason = "OpenSSL is outside the approved TLS policy." },
  { name = "openssl-sys", reason = "OpenSSL is outside the approved TLS policy." },
  { name = "tokio-native-tls", reason = "The client uses rustls exclusively." },
]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]

[sources]
unknown-git = "deny"
unknown-registry = "deny"
