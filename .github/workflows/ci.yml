name: Native CLI CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-cli-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installer-contract:
    name: Installer / ${{ matrix.context }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ubuntu-latest
            runner: ubuntu-22.04
          - context: macos-latest
            runner: macos-15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Ensure ShellCheck is available
        shell: bash
        run: |
          set -euo pipefail
          if command -v shellcheck >/dev/null 2>&1; then
            exit 0
          fi
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install shellcheck
          else
            sudo apt-get update
            sudo apt-get install --yes shellcheck
          fi
      - name: Lint distribution scripts
        shell: bash
        run: shellcheck install.sh tests/installer_contract.sh scripts/release/*.sh packaging/macos/*.sh
      - name: Test the hosted-installer contract
        shell: bash
        run: bash tests/installer_contract.sh

  native-cli-smoke:
    name: Native CLI / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15, windows-2025]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install the Linux Secret Service fixture
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes dbus-x11 gnome-keyring libdbus-1-dev pkg-config
      - name: Build the native release binary
        run: cargo build --release --locked --package heyfood-bin
      - name: Locate the native executable
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "HEYFOOD_BIN=target/release/heyfood.exe" >> "$GITHUB_ENV"
          else
            echo "HEYFOOD_BIN=target/release/heyfood" >> "$GITHUB_ENV"
          fi
      - name: Install deterministic archive tooling
        if: runner.os == 'macOS'
        run: brew install gnu-tar
      - name: Package the exact macOS or Linux showcase archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version=$(cargo metadata --locked --no-deps --format-version 1 |
            jq -er '.packages[] | select(.name == "heyfood-bin") | .version')
          target=$(rustc -vV | sed -n 's/^host: //p')
          mkdir -p showcase-dist showcase-evidence
          scripts/release/package.sh "$HEYFOOD_BIN" "$version" "$target" showcase-dist
          archive="heyfood-v$version-$target.tar.gz"
          (
            cd showcase-dist
            shasum -a 256 "$archive" >SHA256SUMS
          )
          {
            echo "HEYFOOD_SHOWCASE_ARCHIVE=$GITHUB_WORKSPACE/showcase-dist/$archive"
            echo "HEYFOOD_SHOWCASE_MANIFEST=$GITHUB_WORKSPACE/showcase-dist/SHA256SUMS"
            echo "HEYFOOD_SHOWCASE_EVIDENCE_DIR=$GITHUB_WORKSPACE/showcase-evidence"
            echo "HEYFOOD_SHOWCASE_TARGET=$target"
            echo "HEYFOOD_SHOWCASE_VERSION=$version"
          } >>"$GITHUB_ENV"
      - name: Package the exact Windows showcase archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = cargo metadata --locked --no-deps --format-version 1 |
            ConvertFrom-Json |
            Select-Object -ExpandProperty packages |
            Where-Object { $_.name -eq "heyfood-bin" } |
            Select-Object -ExpandProperty version
          $target = (rustc -vV | Select-String '^host: ').Line.Substring(6)
          New-Item -ItemType Directory -Force showcase-dist, showcase-evidence | Out-Null
          ./packaging/windows/package.ps1 `
            -Binary $env:HEYFOOD_BIN `
            -Version $version `
            -Target $target `
            -OutputDirectory showcase-dist
          $archive = "heyfood-v$version-$target.zip"
          $digest = (Get-FileHash -Algorithm SHA256 "showcase-dist/$archive").Hash.ToLowerInvariant()
          "$digest  $archive" | Set-Content -Encoding ascii showcase-dist/SHA256SUMS
          $root = (Get-Location).Path
          @(
            "HEYFOOD_SHOWCASE_ARCHIVE=$root\showcase-dist\$archive"
            "HEYFOOD_SHOWCASE_MANIFEST=$root\showcase-dist\SHA256SUMS"
            "HEYFOOD_SHOWCASE_EVIDENCE_DIR=$root\showcase-evidence"
            "HEYFOOD_SHOWCASE_TARGET=$target"
            "HEYFOOD_SHOWCASE_VERSION=$version"
          ) | Add-Content -Encoding utf8 $env:GITHUB_ENV
      - name: Qualify clean registration and first turn from the installed archive
        run: cargo test --locked --package heyfood-bin --test installed_showcase -- --ignored --exact installed_archive_registration_and_first_turn
      - name: Upload installed-artifact foundation evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installed-showcase-${{ matrix.os }}
          path: showcase-evidence
          if-no-files-found: warn
          retention-days: 14
      - name: Parse every Windows release script
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($script in Get-ChildItem packaging/windows/*.ps1) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $script.FullName,
              [ref] $tokens,
              [ref] $errors
            ) | Out-Null
            if ($errors.Count -ne 0) {
              $errors | ForEach-Object { Write-Error $_ }
              throw "PowerShell parser rejected $($script.FullName)"
            }
          }
      - name: Verify the active native command surface
        shell: bash
        run: |
          "$HEYFOOD_BIN" --version
          "$HEYFOOD_BIN" --help
          "$HEYFOOD_BIN" register --help
          "$HEYFOOD_BIN" login --help
          "$HEYFOOD_BIN" ask --help
          "$HEYFOOD_BIN" grocery --help
          "$HEYFOOD_BIN" health --help
          "$HEYFOOD_BIN" completion bash > completion.bash
          test -s completion.bash
      - name: Package, smoke, and reproduce the Windows release archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = cargo metadata --locked --no-deps --format-version 1 |
            ConvertFrom-Json |
            Select-Object -ExpandProperty packages |
            Where-Object { $_.name -eq "heyfood-bin" } |
            Select-Object -ExpandProperty version
          ./packaging/windows/package.ps1 `
            -Binary target/release/heyfood.exe `
            -Version $version `
            -Target x86_64-pc-windows-msvc `
            -OutputDirectory dist
          ./packaging/windows/smoke.ps1 `
            -ReleaseDirectory dist `
            -Version $version
          ./packaging/windows/package.ps1 `
            -Binary target/release/heyfood.exe `
            -Version $version `
            -Target x86_64-pc-windows-msvc `
            -OutputDirectory dist-repeat
          $archive = "heyfood-v$version-x86_64-pc-windows-msvc.zip"
          $first = (Get-FileHash -Algorithm SHA256 "dist/$archive").Hash
          $second = (Get-FileHash -Algorithm SHA256 "dist-repeat/$archive").Hash
          if ($first -ne $second) {
            throw "Windows release archive is not reproducible"
          }
      - name: Run native CLI and composition-root tests
        if: runner.os != 'Linux'
        run: cargo test --locked --package heyfood-cli --package heyfood-bin
      - name: Run Linux native CLI and composition-root tests
        if: runner.os == 'Linux'
        run: |
          dbus-run-session -- bash -euo pipefail -c '
            printf "\n" | gnome-keyring-daemon --unlock
            cargo test --locked --package heyfood-cli --package heyfood-bin
          '

  native-release-contract:
    name: Build and verify distribution
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Linux native credential build dependencies
        run: sudo apt-get update && sudo apt-get install --yes libdbus-1-dev pkg-config
      - name: Build and package the host executable as the five-archive fixture set
        shell: bash
        run: |
          set -euo pipefail
          version=$(cargo metadata --locked --no-deps --format-version 1 |
            jq -er '.packages[] | select(.name == "heyfood-bin") | .version')
          cargo build --release --locked --package heyfood-bin
          binary=target/release/heyfood
          for target in \
            aarch64-apple-darwin \
            aarch64-unknown-linux-gnu \
            x86_64-apple-darwin \
            x86_64-unknown-linux-gnu; do
            scripts/release/package.sh "$binary" "$version" "$target" dist
          done
          pwsh -NoProfile -File packaging/windows/package.ps1 \
            -Binary "$binary" \
            -Version "$version" \
            -Target x86_64-pc-windows-msvc \
            -OutputDirectory dist
          scripts/release/checksums.sh dist "$version"
          scripts/release/verify-assets.sh dist "$version"
          scripts/release/smoke.sh dist "$version" x86_64-unknown-linux-gnu
      - name: Prove deterministic archive bytes
        shell: bash
        run: |
          set -euo pipefail
          version=$(cargo metadata --locked --no-deps --format-version 1 |
            jq -er '.packages[] | select(.name == "heyfood-bin") | .version')
          scripts/release/package.sh \
            target/release/heyfood "$version" x86_64-unknown-linux-gnu dist-repeat
          pwsh -NoProfile -File packaging/windows/package.ps1 \
            -Binary target/release/heyfood \
            -Version "$version" \
            -Target x86_64-pc-windows-msvc \
            -OutputDirectory dist-repeat
          cmp \
            "dist/heyfood-v$version-x86_64-unknown-linux-gnu.tar.gz" \
            "dist-repeat/heyfood-v$version-x86_64-unknown-linux-gnu.tar.gz"
          cmp \
            "dist/heyfood-v$version-x86_64-pc-windows-msvc.zip" \
            "dist-repeat/heyfood-v$version-x86_64-pc-windows-msvc.zip"
