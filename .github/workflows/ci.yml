name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installer-tests:
    name: Installer / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Test the hosted-installer contract
        run: |
          python -m pip install "pytest>=8,<10"
          python -m pytest -q tests/test_installer.py

  unit-tests:
    name: Python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run CLI suite
        run: python -m pytest -q

  build-distribution:
    name: Build and verify distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install "build>=1.2,<2" "twine>=6,<7"
          python -m build
      - name: Check metadata and artifact contents
        run: |
          python -m twine check dist/*
          python scripts/verify_artifacts.py dist
      - name: Upload exact distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  install-smoke:
    name: pipx / Python ${{ matrix.python }} / ${{ matrix.os }}
    needs: build-distribution
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist
      - name: Install exact wheel with pipx
        run: |
          export PIPX_BIN_DIR="$RUNNER_TEMP/pipx-bin"
          echo "PIPX_BIN_DIR=$PIPX_BIN_DIR" >> "$GITHUB_ENV"
          python -m pip install --upgrade pip "pipx>=1.7,<2"
          python -m pipx install --python "$(command -v python)" dist/*.whl
      - name: Smoke installed commands
        run: |
          VERSION=$(PYTHONPATH=src python -c 'from heyfood_cli import __version__; print(__version__)')
          python scripts/smoke_installed_cli.py "$PIPX_BIN_DIR/heyfood" "$VERSION"
      - name: Uninstall cleanly
        run: python -m pipx uninstall heyfood-cli
