name: Native CLI CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-cli-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installer-contract:
    name: Installer / ${{ matrix.context }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ubuntu-latest
            runner: ubuntu-22.04
          - context: macos-latest
            runner: macos-15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Ensure ShellCheck is available
        shell: bash
        run: |
          set -euo pipefail
          if command -v shellcheck >/dev/null 2>&1; then
            exit 0
          fi
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install shellcheck
          else
            sudo apt-get update
            sudo apt-get install --yes shellcheck
          fi
      - name: Lint distribution scripts
        shell: bash
        run: shellcheck install.sh tests/installer_contract.sh scripts/release/*.sh
      - name: Test the hosted-installer contract
        shell: bash
        run: bash tests/installer_contract.sh

  native-cli-smoke:
    name: Native CLI / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15, windows-2025]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build the native release binary
        run: cargo build --release --locked --package heyfood-bin
      - name: Locate the native executable
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "HEYFOOD_BIN=target/release/heyfood.exe" >> "$GITHUB_ENV"
          else
            echo "HEYFOOD_BIN=target/release/heyfood" >> "$GITHUB_ENV"
          fi
      - name: Verify the active native command surface
        shell: bash
        run: |
          "$HEYFOOD_BIN" --version
          "$HEYFOOD_BIN" --help
          "$HEYFOOD_BIN" register --help
          "$HEYFOOD_BIN" login --help
          "$HEYFOOD_BIN" ask --help
          "$HEYFOOD_BIN" grocery --help
          "$HEYFOOD_BIN" health --help
          "$HEYFOOD_BIN" completion bash > completion.bash
          test -s completion.bash
      - name: Run native CLI and composition-root tests
        run: cargo test --locked --package heyfood-cli --package heyfood-bin

  native-release-contract:
    name: Build and verify distribution
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build and package the host executable as the four-file fixture set
        shell: bash
        run: |
          set -euo pipefail
          version=$(cargo metadata --locked --no-deps --format-version 1 |
            jq -er '.packages[] | select(.name == "heyfood-bin") | .version')
          cargo build --release --locked --package heyfood-bin
          binary=target/release/heyfood
          for target in \
            aarch64-apple-darwin \
            aarch64-unknown-linux-gnu \
            x86_64-apple-darwin \
            x86_64-unknown-linux-gnu; do
            scripts/release/package.sh "$binary" "$version" "$target" dist
          done
          scripts/release/checksums.sh dist "$version"
          scripts/release/verify-assets.sh dist "$version"
          scripts/release/smoke.sh dist "$version" x86_64-unknown-linux-gnu
      - name: Prove deterministic archive bytes
        shell: bash
        run: |
          set -euo pipefail
          version=$(cargo metadata --locked --no-deps --format-version 1 |
            jq -er '.packages[] | select(.name == "heyfood-bin") | .version')
          scripts/release/package.sh \
            target/release/heyfood "$version" x86_64-unknown-linux-gnu dist-repeat
          cmp \
            "dist/heyfood-v$version-x86_64-unknown-linux-gnu.tar.gz" \
            "dist-repeat/heyfood-v$version-x86_64-unknown-linux-gnu.tar.gz"
