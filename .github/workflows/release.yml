name: Release native CLI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: native-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate exact release commit
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Refuse releases while native installation is suspended
        shell: bash
        run: |
          if grep -Fqx '# HEYFOOD_NATIVE_INSTALLATION_SUSPENDED=1' install.sh; then
            echo "Native distribution is suspended; replace the fail-closed installer before publishing another release." >&2
            exit 1
          fi
      - name: Match annotated tag, workspace version, and main
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "$(git cat-file -t "$GITHUB_REF_NAME")" = "tag"
          git fetch --no-tags origin main:refs/remotes/origin/main
          tag_commit=$(git rev-parse "${GITHUB_REF_NAME}^{commit}")
          test "$tag_commit" = "$(git rev-parse HEAD)"
          test "$tag_commit" = "$(git rev-parse origin/main)"
          version=$(cargo metadata --locked --no-deps --format-version 1 |
            jq -er '.packages[] | select(.name == "heyfood-bin") | .version')
          test "$GITHUB_REF_NAME" = "v$version"
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "A GitHub Release already exists for $GITHUB_REF_NAME; release assets are immutable." >&2
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
      - name: Install the Linux Secret Service fixture
        run: |
          sudo apt-get update
          sudo apt-get install --yes dbus-x11 gnome-keyring libdbus-1-dev pkg-config
      - name: Test the exact default native workspace and broker composition
        run: |
          dbus-run-session -- bash -euo pipefail -c '
            printf "\n" | gnome-keyring-daemon --unlock
            cargo test --workspace --locked --all-targets
          '
      - name: Test the secondary portable workspace
        run: cargo test --workspace --locked --all-targets --no-default-features

  build:
    name: Build / ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Linux native credential build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libdbus-1-dev pkg-config
      - name: Verify the pinned native toolchain
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          rustup toolchain install 1.94.0 --profile minimal --no-self-update
          rustup target add "$TARGET" --toolchain 1.94.0
          test "$(rustc -vV | sed -n 's/^host: //p')" = "$TARGET"
      - name: Build and smoke the release executable
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          export CARGO_INCREMENTAL=0
          export SOURCE_DATE_EPOCH
          SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)
          cargo build --locked --release --package heyfood-bin --target "$TARGET"
          binary="target/$TARGET/release/heyfood"
          test "$($binary --version)" = "heyfood $VERSION"
          "$binary" --help >/dev/null
          "$binary" register --help >/dev/null
      - name: Install deterministic archive tooling
        if: runner.os == 'macOS'
        run: brew install gnu-tar
      - name: Package the exact executable
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: scripts/release/package.sh "target/$TARGET/release/heyfood" "$VERSION" "$TARGET" dist
      - name: Upload the native archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.target }}
          path: dist/heyfood-v${{ needs.validate.outputs.version }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Attest and create GitHub Release
    needs: [validate, build]
    runs-on: ubuntu-22.04
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: native-*
          path: dist
          merge-multiple: true
      - name: Generate and verify the complete release set
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          scripts/release/checksums.sh dist "$VERSION"
          scripts/release/verify-assets.sh dist "$VERSION"
      - name: Sign release assets with GitHub artifact attestations
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/SHA256SUMS
      - name: Create the immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          gh release create "v$VERSION" dist/*.tar.gz dist/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "heyfood v$VERSION" \
            --generate-notes

  post-release-smoke:
    name: Public native artifact smoke
    needs: [validate, publish]
    permissions:
      attestations: read
      contents: read
    uses: ./.github/workflows/post-release-smoke.yml
    with:
      version: ${{ needs.validate.outputs.version }}
