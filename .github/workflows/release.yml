name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build exact release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Match tag to the single-sourced package version
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([abrc][0-9]+)?$ ]]
          test "$(git cat-file -t "$GITHUB_REF_NAME")" = "tag"
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          VERSION=$(PYTHONPATH=src python -c 'from heyfood_cli import __version__; print(__version__)')
          test "$GITHUB_REF_NAME" = "v$VERSION"
      - name: Test and build once
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" "build>=1.2,<2" "twine>=6,<7" "pipx>=1.7,<2"
          python -m pytest -q
          python -m build
      - name: Verify metadata, contents, and clean installation
        run: |
          export PIPX_BIN_DIR="$RUNNER_TEMP/pipx-bin"
          python -m twine check dist/*
          python scripts/verify_artifacts.py dist
          python -m pipx install --python "$(command -v python)" dist/*.whl
          VERSION=${GITHUB_REF_NAME#v}
          python scripts/smoke_installed_cli.py "$PIPX_BIN_DIR/heyfood" "$VERSION"
          python -m pipx uninstall heyfood-cli
      - name: Upload the verified bytes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish through PyPI trusted publishing
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/heyfood-cli/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist
      - name: Publish exact verified artifacts with attestations
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    name: Create GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist
      - name: Attach published artifacts to the matching tag
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
