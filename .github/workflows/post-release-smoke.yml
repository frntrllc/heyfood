name: Post-release native smoke

run-name: Public native smoke v${{ inputs.version }}

on:
  workflow_call:
    inputs:
      version:
        description: GitHub Release version without the v prefix
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: GitHub Release version without the v prefix
        required: true
        type: string

permissions:
  attestations: read
  contents: read

jobs:
  public-native:
    name: v${{ inputs.version }} / ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET: ${{ matrix.target }}
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Download the public release assets
        shell: bash
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          mkdir release
          gh release download "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'heyfood-*.tar.gz' \
            --pattern 'heyfood-*.zip' \
            --pattern SHA256SUMS \
            --dir release
      - name: Verify checksums, archive policy, and signed provenance
        shell: bash
        run: |
          set -euo pipefail
          scripts/release/verify-assets.sh release "$VERSION"
          for asset in release/*.tar.gz release/*.zip release/SHA256SUMS; do
            gh attestation verify "$asset" --repo "$GITHUB_REPOSITORY"
          done
      - name: Smoke the native public executable
        if: runner.os != 'Windows'
        shell: bash
        run: scripts/release/smoke.sh release "$VERSION" "$TARGET"
      - name: Smoke the native public Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./packaging/windows/smoke.ps1 `
            -ReleaseDirectory release `
            -Version $env:VERSION `
            -RequireAuthenticode `
            -PublisherSubject "${{ vars.WINDOWS_CODESIGN_SUBJECT }}"
      - name: Verify hosted installer provenance
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir hosted-installer
          curl -qfsSL \
            --proto '=https' \
            --tlsv1.2 \
            --output hosted-installer/install.sh \
            https://hey.food/install.sh
          curl -qfsSL \
            --proto '=https' \
            --tlsv1.2 \
            --output hosted-installer/install.sh.sha256 \
            https://hey.food/install.sh.sha256
          cmp install.sh hosted-installer/install.sh
          cmp install.sh.sha256 hosted-installer/install.sh.sha256
          (
            cd hosted-installer
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum -c install.sh.sha256
            else
              shasum -a 256 -c install.sh.sha256
            fi
          )
      - name: Install through the public hosted path
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          install_home="$RUNNER_TEMP/heyfood-home"
          install_bin="$RUNNER_TEMP/heyfood-bin"
          mkdir -p "$install_home" "$install_bin"
          chmod 0700 "$install_home" "$install_bin"
          HOME="$install_home" \
            HEYFOOD_BIN_DIR="$install_bin" \
            HEYFOOD_VERSION="$VERSION" \
            bash hosted-installer/install.sh
          test "$("$install_bin/heyfood" --version)" = "heyfood $VERSION"
          "$install_bin/heyfood" --help >/dev/null
          rm "$install_bin/heyfood"
          test ! -e "$install_bin/heyfood"
