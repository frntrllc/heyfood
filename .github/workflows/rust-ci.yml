name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      require_provenance_approval:
        description: Fail unless asset provenance has independent exact-SHA approval
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Compile the portable default feature set
        run: cargo check --locked --workspace --all-targets

  format:
    name: rustfmt / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint the portable default feature set
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Test the portable default feature set
        run: cargo test --locked --workspace

  dependency-dag:
    name: Dependency DAG / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: cargo xtask dependency-dag

  stable-contracts:
    name: Stable contracts / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: cargo xtask verify-stable-contracts

  assets-provenance:
    name: Asset schemas, hashes, and provenance / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: cargo xtask verify-assets

  migration-ledger:
    name: Migration ledger freeze / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: cargo xtask verify-migration-ledger

  phase0-evidence:
    name: Phase 0 inventory / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: cargo xtask verify-phase0-evidence

  phase0-qualification:
    name: Internal PTY, signal, restoration vertical / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: cargo test --locked --package heyfood-bin --test phase0_qualification

  dependency-security:
    name: Cargo Audit and Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install the exact Cargo Audit policy tool
        run: cargo install cargo-audit --locked --version 0.22.2
      - name: Reject RustSec advisories and warnings
        run: cargo audit --deny warnings
      - name: Enforce dependency bans, licenses, and sources
        uses: EmbarkStudios/cargo-deny-action@76cd80eb775d7bbbd2d80292136d74d39e1b4918 # v2.0.14
        with:
          command: check

  provenance-approval:
    name: Independent provenance approval
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.require_provenance_approval }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: cargo xtask verify-assets-approved

  native-credentials:
    name: Native credentials / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Phase 0 does not assume a Linux runner has a usable Secret Service.
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint the target-native credential backend
        run: cargo clippy --locked --package heyfood-platform --all-targets --features native-credentials -- -D warnings
      - name: Test the target-native credential backend
        run: cargo test --locked --package heyfood-platform --features native-credentials

  native-audio:
    name: Native audio / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux native audio requires ALSA development packages not present on
        # every supported runner image; qualify it only in an explicit job once
        # that system dependency and real-device evidence are defined.
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint the target-native audio backend
        run: cargo clippy --locked --package heyfood-voice --all-targets --features native-audio -- -D warnings
      - name: Test the target-native audio backend
        run: cargo test --locked --package heyfood-voice --features native-audio
